name: FoJing
options:
  bundleIdPrefix: com.jameswang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
targets:
  FoJingApp:
    type: application
    platform: iOS
    sources:
      - FoJingApp/Sources/FoJingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jameswang.fojing
        PRODUCT_NAME: FoJing
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "佛经"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    scheme:
      testTargets: []
