name: FoJing
options:
  bundleIdPrefix: com.jameswang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: 468SHW5TLW
    SWIFT_VERSION: "5.9"
targets:
  FoJingApp:
    type: application
    platform: iOS
    sources:
      - FoJingApp/Sources/FoJingApp
      - path: FoJingApp/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jameswang.fojing
        PRODUCT_NAME: FoJing
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "净诵"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - FoJingAppTests
  FoJingAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FoJingAppTests
    dependencies:
      - target: FoJingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jameswang.fojing.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FoJing.app/FoJing"
